name: TFT Daily Crawl

# Crawls every Riot TFT region and writes per-day, per-bucket stats to
# Supabase. Uses GitHub Actions matrix to run the 17 regions in parallel —
# each runner does ~25-30 min of Riot calls on the final daily run, less
# on intraday runs with smaller windows.
#
# Schedule:
#   05:15 UTC          — final run for the *previous* day, mode=auto.
#                        Window = [yesterday 05, today 05), day = yesterday.
#                        Closes the prior day with the full 24h.
#   11:15/17:15/23:15  — intraday runs for the *current* day, mode=today.
#                        Window = [today 05, now), day = today. Each upsert
#                        overwrites the previous intraday aggregate for the
#                        same key, so the current day's stats grow ~every 6h
#                        until the next 05:15 final run seals them.

on:
  schedule:
    # Final run for yesterday — 15-min offset gives Riot's match-history
    # index a buffer to settle the last matches of the closed window.
    - cron: '15 5 * * *'
    # Intraday runs for today: 6h, 12h, 18h after the day's 05 UTC anchor.
    - cron: '15 11,17,23 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode: auto (yesterday final) or today (rolling intraday)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - today

permissions:
  contents: write

jobs:
  # Stage 1: refresh set + asset metadata. Runs once, on its own runner, so
  # the matrix jobs all see the same tft-set.json + asset bundle.
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Detect TFT set
        run: node scripts/detect-tft-set.mjs
        continue-on-error: true

      - name: Refresh TFT patch roadmap
        # Riot publishes a patch schedule article that lists every patch date
        # for the year. We scrape it daily so set-start / set-end / future
        # patch dates stay current in /api/tft/sets/current.
        run: node scripts/fetch-tft-roadmap.mjs
        continue-on-error: true

      - name: Refresh TFT asset bundle
        run: node scripts/fetch-tft-assets.mjs
        continue-on-error: true

      - name: Refresh TFT tier distribution
        run: node scripts/fetch-tft-tier-distribution.mjs
        continue-on-error: true

      - name: Commit set/asset updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tft-set.json public/tft-roadmap.json public/tft-tier-distribution.json public/tft-assets*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No set/asset changes."
          else
            git commit -m "chore: daily TFT set/asset refresh"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi

  # Stage 2: crawl every region in parallel and write to Supabase.
  crawl:
    needs: prepare
    runs-on: ubuntu-latest
    # 30-40 min upper bound per region with the production TFT key
    # (~18 req/s effective, ~20k matches per region).
    timeout-minutes: 60
    strategy:
      fail-fast: false   # if one region 5xx's we still want the others to land
      max-parallel: 17
      matrix:
        region:
          - euw1
          - kr
          - na1
          - eun1
          - br1
          - jp1
          - oc1
          - la1
          - la2
          - tr1
          - ru
          - me1
          - ph2
          - sg2
          - th2
          - tw2
          - vn2
    env:
      RIOT_API_KEY_TFT: ${{ secrets.RIOT_API_KEY_TFT }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Crawl ${{ matrix.region }} → Supabase
        if: env.RIOT_API_KEY_TFT != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        # --no-json: skip the legacy /public/tft-stats-*.json output so 17
        # parallel runners don't fight over `git push`. The Supabase tables
        # are the source of truth from now on.
        #
        # Mode selection:
        #   schedule '15 5 * * *' → auto   (finalize yesterday)
        #   schedule '15 11,17,23 * * *' → today (rolling current-day intraday)
        #   workflow_dispatch → use the input (defaults to auto)
        env:
          SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ "$SCHEDULE" = "15 11,17,23 * * *" ]; then
            MODE=today
          elif [ -n "$DISPATCH_MODE" ]; then
            MODE="$DISPATCH_MODE"
          else
            MODE=auto
          fi
          echo "Crawl mode: $MODE"
          node scripts/collect-tft-allranks.mjs --region ${{ matrix.region }} --no-json --mode "$MODE"

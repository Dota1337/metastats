name: TFT Weekly Crawl

on:
  schedule:
    # Saturday 06:00 UTC — phased between the LoL Friday crawl and the
    # Sunday marketvalue refresh. Currently EUW only; KR is added once the
    # production key arrives (it doubles the runtime per crawl).
    - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: write

env:
  RIOT_API_KEY_TFT: ${{ secrets.RIOT_API_KEY_TFT }}

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    # Production TFT key (~18 req/s effective, capped by match-detail method-limit).
    # ~3500 sampled players * 8 matches → ~20k unique matches → ~20 min crawl.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Refresh the set tag first so the crawler filters on the live set
      # right away (the regular weekly-crawl also runs this, but the TFT
      # workflow runs on a different day so we can't rely on that).
      - name: Detect TFT set
        run: node scripts/detect-tft-set.mjs
        continue-on-error: true

      # Refresh CommunityDragon-sourced asset bundle (icons, names,
      # apiName→display mapping). Needed because Riot Data Dragon's TFT
      # data is set-13 frozen and uses item IDs that don't match Match-V1.
      - name: Refresh TFT asset bundle
        run: node scripts/fetch-tft-assets.mjs
        continue-on-error: true

      - name: Crawl TFT all-ranks (EUW)
        if: env.RIOT_API_KEY_TFT != ''
        run: node scripts/collect-tft-allranks.mjs --region euw1

      - name: Build TFT knowledge graph (EUW)
        run: node scripts/build-tft-knowledge-graph.mjs --region euw1
        continue-on-error: true

      - name: Refresh TFT tier distribution
        run: node scripts/fetch-tft-tier-distribution.mjs
        continue-on-error: true

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tft-set.json public/tft-stats-*.json public/tft-graph-*.json public/tft-tier-distribution.json public/tft-assets*.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: weekly TFT data update

          Co-Authored-By: claude-flow <ruv@ruv.net>"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi

name: Weekly Data Crawl (EUW)

# EUW LoL crawl + all once-per-week detect/refresh steps. Korea is in
# weekly-crawl-kr.yml on a different cron slot so neither side has to fit
# into the 360min GHA cap by itself — the previous combined workflow
# couldn't finish reliably with the new build aggregator.

on:
  schedule:
    # Every Friday at 06:00 UTC
    - cron: '0 6 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

env:
  RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub hard cap for free plan — crawlers are rate-limited by Riot dev key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Pro Player Crawler (no Riot API key needed)
      - name: Crawl Pro Players
        run: node scripts/crawl-pro-players.mjs

      # Champion Stats Crawler — EUW (needs valid Riot API key)
      # Korea is split into weekly-crawl-kr.yml because the combined run
      # was hitting the 360min GHA cap with Solo+Flex + the build aggregator.
      - name: Crawl Champion Stats (EUW)
        if: env.RIOT_API_KEY != ''
        run: node scripts/collect-highelo.mjs

      # Season detection — runs no Riot API, only Data Dragon. Updates
      # public/seasons.json and exposes `season-changed` for the issue step.
      - name: Detect new season
        id: season
        run: node scripts/detect-season.mjs

      # Pull external rank distribution (esportstales.com -> leagueofgraphs)
      # so the leaderboard chart is real data, not stale hardcoded values.
      # Failure is non-fatal: keeps the previous JSON if scrape breaks.
      - name: Refresh tier distribution
        run: node scripts/fetch-tier-distribution.mjs
        continue-on-error: true

      # TFT set detection — pulls from CommunityDragon, no Riot API needed.
      # Surfaces a `set-changed` flag for downstream notifications.
      - name: Detect new TFT set
        id: tftset
        run: node scripts/detect-tft-set.mjs
        continue-on-error: true

      # Commit updated data files
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pro-players.json public/champion-stats-euw.json public/champion-builds-euw.json public/seasons.json public/tier-distribution.json public/tft-set.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: weekly data update (pro players + champion stats)

          Co-Authored-By: claude-flow <ruv@ruv.net>"
            # Race-safe push: rebase onto any commits that landed on main during the
            # multi-hour crawl. The generated data files are workflow-exclusive, so
            # rebase conflicts are impossible here.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi

      # If the season detector flagged a major bump, open a GitHub issue so
      # the maintainer can confirm and (if desired) tag historical Marktwert
      # snapshots manually. We do NOT auto-tag snapshots — a false positive
      # would split the historical chart irreversibly.
      - name: Open season-bump issue
        if: steps.season.outputs.season-changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Season bump detected: ${{ steps.season.outputs.previous-season }} → ${{ steps.season.outputs.new-season }}" \
            --body "Detector flagged a new major patch.

          - Previous season: \`${{ steps.season.outputs.previous-season }}\`
          - New season: \`${{ steps.season.outputs.new-season }}\`
          - Start patch: \`${{ steps.season.outputs.start-patch }}\`

          \`public/seasons.json\` has already been updated.

          **Manual follow-up:**
          1. Confirm this is a real season start (Riot's official patch notes).
          2. Decide whether to tag existing \`market_value_history\` rows with the previous season ID.
          3. Close this issue once handled." \
            --label "season-detected" || echo "Issue creation failed (non-fatal)"

      # Deployment is handled by Vercel's GitHub integration — the push above
      # automatically triggers a production deploy, no CLI step needed here.

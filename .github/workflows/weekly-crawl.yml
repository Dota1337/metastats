name: Weekly Data Crawl

on:
  schedule:
    # Every Friday at 06:00 UTC
    - cron: '0 6 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub hard cap for free plan — crawlers are rate-limited by Riot dev key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Pro Player Crawler (no Riot API key needed)
      - name: Crawl Pro Players
        run: node scripts/crawl-pro-players.mjs

      # Champion Stats Crawler — EUW (needs valid Riot API key)
      - name: Crawl Champion Stats (EUW)
        if: env.RIOT_API_KEY != ''
        run: node scripts/collect-highelo.mjs

      # Champion Stats Crawler — Korea (needs valid Riot API key)
      - name: Crawl Champion Stats (Korea)
        if: env.RIOT_API_KEY != ''
        run: node scripts/collect-kr-cn.mjs

      # Commit updated data files
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pro-players.json public/champion-stats-*.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: weekly data update (pro players + champion stats)

          Co-Authored-By: claude-flow <ruv@ruv.net>"
            # Race-safe push: rebase onto any commits that landed on main during the
            # multi-hour crawl. The generated data files are workflow-exclusive, so
            # rebase conflicts are impossible here.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi
      # Deployment is handled by Vercel's GitHub integration — the push above
      # automatically triggers a production deploy, no CLI step needed here.

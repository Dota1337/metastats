<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <!-- Stripped-down version of logo.svg for ICO conversion. Drops gradients,
       glow filter, and the secondary hex grid so the 256x256 PNG layer
       palette-quantises down to a handful of colours, keeping the four-layer
       ICO under Overwolf's 150 KB store limit. -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="#0e1525"/>

  <!-- Hex frame around the mark -->
  <polygon points="62,68 194,68 218,128 194,188 62,188 38,128"
           stroke="#7B61FF" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- 'm' monogram solid -->
  <path d="M 80 90
           L 80 170
           M 80 100
           Q 80 88, 96 88
           Q 112 88, 112 110
           L 112 170
           M 112 110
           Q 112 88, 128 88
           Q 144 88, 144 110
           L 144 170"
        stroke="#7B61FF" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Sparkline accent -->
  <polyline points="78,200 116,194 154,184 192,164"
            stroke="#a892ff" stroke-width="5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="192" cy="164" r="5" fill="#f0c040"/>
</svg>

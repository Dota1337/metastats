name: TFT Marketvalue Daily Snapshot

on:
  schedule:
    # 05:00 UTC daily — runs after tft-daily-crawl (04:00 UTC) so the
    # patch knowledge graph and daily stats are fresh for the agents.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      include_master:
        description: 'Include Master tier (10x volume)'
        required: false
        default: 'false'
      regions:
        description: 'Comma-separated regions (default: euw1,kr,na1)'
        required: false
        default: 'euw1,kr,na1'

permissions:
  contents: read

env:
  RIOT_API_KEY_TFT: ${{ secrets.RIOT_API_KEY_TFT }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # ~1000 players Chall+GM per region @ ~3s/player (account + 30 match details
    # at 180 req/10s) ≈ 50 min/region. Cron-job runs in parallel via matrix.
    timeout-minutes: 120

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        region:
          - euw1
          - kr
          - na1
          # Add more regions here once we have appetite for the volume.
          # The TFT production key handles ~50 req/s app-wide, but it's a
          # shared bucket across all concurrent jobs — keep max-parallel low.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Crawl marketvalues for ${{ matrix.region }}
        if: env.RIOT_API_KEY_TFT != ''
        run: |
          INCLUDE_MASTER=""
          if [ "${{ github.event.inputs.include_master }}" = "true" ]; then
            INCLUDE_MASTER="--include-master"
          fi
          node scripts/collect-tft-marketvalues.mjs --region ${{ matrix.region }} $INCLUDE_MASTER

name: Weekly Data Crawl (KR)

# Korea LoL crawl, split off from the main weekly-crawl. Runs 12 hours
# after the EUW slot so the dev key isn't shared between concurrent runs.
# Once the production key arrives we can collapse this back into the main
# workflow — the dev-key 90 req/2min budget is the only reason for the split.

on:
  schedule:
    # Every Friday at 18:00 UTC (12h after the EUW crawl)
    - cron: '0 18 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-crawl-kr
  cancel-in-progress: false

env:
  RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Riot LoL key pre-flight
        uses: ./.github/actions/riot-preflight
        with:
          game: lol

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Crawl Champion Stats (Korea)
        if: env.RIOT_API_KEY != ''
        run: node scripts/collect-kr-cn.mjs

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/champion-stats-kr.json public/champion-builds-kr.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: weekly KR data update

          Co-Authored-By: claude-flow <ruv@ruv.net>"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi

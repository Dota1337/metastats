<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1525"/>
      <stop offset="1" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="64" y1="48" x2="192" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7B61FF"/>
      <stop offset="1" stop-color="#a892ff"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="180" x2="256" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7B61FF"/>
      <stop offset="0.7" stop-color="#a892ff"/>
      <stop offset="1" stop-color="#f0c040"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle hex grid pattern (TFT board reference) — 3×3 hexes, low opacity -->
  <g stroke="url(#accentGrad)" stroke-width="2.5" fill="none" opacity="0.22">
    <!-- Row 1 -->
    <polygon points="64,84 84,72 104,84 104,108 84,120 64,108"/>
    <polygon points="116,84 136,72 156,84 156,108 136,120 116,108"/>
    <polygon points="168,84 188,72 208,84 208,108 188,120 168,108"/>
    <!-- Row 2 (offset) -->
    <polygon points="90,128 110,116 130,128 130,152 110,164 90,152"/>
    <polygon points="142,128 162,116 182,128 182,152 162,164 142,152"/>
  </g>

  <!-- Primary mark: "m" letter as the brand initial, in accent gradient -->
  <g filter="url(#softGlow)">
    <path d="M 80 90
             L 80 170
             M 80 100
             Q 80 88, 96 88
             Q 112 88, 112 110
             L 112 170
             M 112 110
             Q 112 88, 128 88
             Q 144 88, 144 110
             L 144 170"
          stroke="url(#accentGrad)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Ascending sparkline beneath — symbol for marktwert rising -->
  <polyline
    points="64,200 96,196 128,184 160,178 192,158"
    stroke="url(#sparkGrad)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Tiny data points on sparkline -->
  <g fill="#a892ff">
    <circle cx="64" cy="200" r="4"/>
    <circle cx="128" cy="184" r="4"/>
    <circle cx="192" cy="158" r="5" fill="#f0c040"/>
  </g>
</svg>

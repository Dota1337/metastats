name: Market Value Refresh

on:
  schedule:
    # Every Sunday at 06:00 UTC — phased between the Friday Weekly Crawl,
    # so high-elo market values stay fresh for the Marktwert-Page even when
    # nobody clicks those profiles.
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: marketvalue-refresh
  cancel-in-progress: false

env:
  RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 200 players × 95s delay = ~317 min worst case (cache hits run faster).
    # 360 min matches the weekly-crawl ceiling and stays inside GitHub's hard cap.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Riot LoL key pre-flight
        uses: ./.github/actions/riot-preflight
        with:
          game: lol

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No dependencies needed — script uses only built-in fetch.

      - name: Refresh top-50 Challenger + GM (EUW)
        if: env.RIOT_API_KEY != ''
        run: |
          node scripts/refresh-highelo-marketvalues.mjs \
            --gm \
            --top-per-tier 50 \
            --url https://metastats.gg \
            --region euw1

      - name: Refresh top-50 Challenger + GM (KR)
        if: env.RIOT_API_KEY != ''
        run: |
          node scripts/refresh-highelo-marketvalues.mjs \
            --gm \
            --top-per-tier 50 \
            --url https://metastats.gg \
            --region kr
